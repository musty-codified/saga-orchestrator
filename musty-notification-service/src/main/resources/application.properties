camel.component.jetty.use-global-ssl-context-parameters=true

atomic.protocol=${ATOMIC_PROTOCOL:smtp}
atomic.host=${ATOMIC_HOST:smtp.sendgrid.net}
atomic.username=${ATOMIC_USERNAME:apikey}
atomic.port=${ATOMIC_PORT:25}
atomic.uri=${atomic.protocol}://${atomic.host}:${atomic.port}?username=${atomic.username}&password=

ehf.host=${EHF_HOST:localhost}
ehf.method=POST
ehf.path=/api/ehf/fetchKeys
ehf.port=${EHF_PORT:8081}
ehf.protocol=${EHF_PROTOCOL:http}
ehf.uri=${ehf.protocol}://${ehf.host}:${ehf.port}${ehf.path}${ehf.uri-params}
ehf.uri-params=?bridgeEndpoint=true&httpMethod=${ehf.method}&throwExceptionOnFailure=true

vault-connector.host=${VAULT_HOST:localhost}
vault-connector.method=GET
vault-connector.path=/api/credentials/
vault-connector.port=${VAULT_PORT:8083}
vault-connector.protocol=${VAULT_PROTOCOL:http}
vault-connector.uri=${vault-connector.protocol}://${vault-connector.host}:${vault-connector.port}${vault-connector.path}
vault-connector.uri-params=?bridgeEndpoint=true&httpMethod=${vault-connector.method}&throwExceptionOnFailure=false






