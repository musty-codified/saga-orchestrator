version: "3.8"
services:
  # --- MICROSERVICES ---
  order-service:
    container_name: order-service
    build:
      context: ./musty-create-order
      dockerfile: Dockerfile
    ports:
      - "9086:8086"
    depends_on:
      - inventory-db
      - order-db
      - kafka
    networks:
      - saga-net
    environment:
      - SPRING_DATASOURCE_ORDER_URL=jdbc:postgresql://order-db:5432/orders_db
      - SPRING_DATASOURCE_INVENTORY_URL=jdbc:mysql://inventory-db:3306/db_create_order
      - CAMEL_COMPONENT_KAFKA_BROKERS=kafka:9092
    restart: on-failure

  payment-service:
    container_name: payment-service
    build:
      context: ./musty-process-payment
      dockerfile: Dockerfile
    ports:
      - "9087:8087"
    depends_on:
      - payment-db
      - kafka
    networks:
      - saga-net
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://payment-db:5432/payments_db
      - CAMEL_COMPONENT_KAFKA_BROKERS=kafka:9092
    restart: on-failure

  notification-service:
    container_name: notification-service
    build:
      context: ./musty-notification-service
      dockerfile: Dockerfile
    ports:
      - "9088:8088"
    depends_on:
      - kafka
    networks:
      - saga-net
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb+srv://ilemonamustapha_db_user:UhEtvIBacDmduOPP@musty-cluster.b8cyyjp.mongodb.net/notifications?retryWrites=true&w=majority
      - CAMEL_COMPONENT_KAFKA_BROKERS=kafka:9092
    restart: on-failure

# --- DATABASES ---
  order-db:
    container_name: order_db_container
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=papi
      - POSTGRES_DB=orders_db
    networks:
      - saga-net
    ports:
      - "5433:5432"
    volumes:
      - order_data:/var/lib/postgresql/data

  inventory-db:
    container_name: inventory_db_container
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=papimaciano
      - MYSQL_USER=root
      - MYSQL_PASSWORD=papimaciano
      - MYSQL_DATABASE=db_create_order
    networks:
      - saga-net
    ports:
      - "3307:3306"
    volumes:
      - inventory_data:/var/lib/mysql

  payment-db:
    container_name: payment_db_container
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=papi
      - POSTGRES_DB=payments_db
    networks:
      - saga-net
    ports:
      - "5434:5432"
    volumes:
      - payment_data:/var/lib/postgresql/data

  # --- INFRASTRUCTURE (KAFKA KRAFT) ---
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks:
      - saga-net
    ports:
      - "9093:9092"
    environment:
      # KRaft settings
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # Ensure a cluster ID is set
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    volumes:
      - kafka_data:/bitnami/kafka
networks:
  saga-net:
    driver: bridge

volumes:
  order_data:
  inventory_data:
  payment_data:
  kafka_data:
